<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" font-family="Menlo, 'SF Mono', 'DejaVu Sans Mono', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1000" height="420" fill="url(#bg)"/>
  <rect width="1000" height="420" fill="none" stroke="#30363d" stroke-width="2"/>

  <!-- faint grid -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="0" y1="78" x2="1000" y2="78"/>
    <line x1="0" y1="168" x2="1000" y2="168"/>
    <line x1="640" y1="168" x2="640" y2="420"/>
  </g>

  <!-- terminal dots -->
  <g>
    <circle cx="936" cy="34" r="6" fill="#f85149"/>
    <circle cx="958" cy="34" r="6" fill="#d29922"/>
    <circle cx="980" cy="34" r="6" fill="#3fb950"/>
  </g>

  <!-- wordmark -->
  <text x="60" y="118" font-size="62" font-weight="700" letter-spacing="-1">
    <tspan fill="#58a6ff">locale</tspan><tspan fill="#3fb950">diff</tspan>
  </text>
  <text x="62" y="150" font-size="20" fill="#8b949e">catch i18n drift before your users do — framework-agnostic, zero deps</text>

  <!-- comparison panel header -->
  <text x="60" y="205" font-size="15" fill="#6e7681" letter-spacing="0.5">i18n key</text>
  <text x="566" y="205" font-size="16" fill="#8b949e" text-anchor="middle">en</text>
  <text x="566" y="223" font-size="11" fill="#6e7681" text-anchor="middle">base</text>
  <text x="676" y="205" font-size="16" fill="#8b949e" text-anchor="middle">fr</text>
  <text x="786" y="205" font-size="16" fill="#8b949e" text-anchor="middle">zh</text>

  <!-- rows -->
  <g font-size="18">
    <!-- row 1: all present -->
    <text x="70" y="252" fill="#c9d1d9">auth.login</text>
    <text x="566" y="252" fill="#2ea043" text-anchor="middle" font-weight="700">✓</text>
    <text x="676" y="252" fill="#3fb950" text-anchor="middle" font-weight="700">✓</text>
    <text x="786" y="252" fill="#3fb950" text-anchor="middle" font-weight="700">✓</text>

    <!-- row 2: fr missing -->
    <text x="70" y="288" fill="#c9d1d9">auth.errors.locked</text>
    <text x="566" y="288" fill="#2ea043" text-anchor="middle" font-weight="700">✓</text>
    <text x="676" y="288" fill="#f85149" text-anchor="middle" font-weight="700">✗</text>
    <text x="786" y="288" fill="#3fb950" text-anchor="middle" font-weight="700">✓</text>
    <text x="826" y="288" font-size="13" fill="#f85149">missing</text>

    <!-- row 3: plural — fr gap, zh fine (the headline) -->
    <text x="70" y="324" fill="#c9d1d9">cart.items <tspan fill="#6e7681">·plural</tspan></text>
    <text x="566" y="324" fill="#2ea043" text-anchor="middle" font-weight="700">✓</text>
    <text x="676" y="324" fill="#d29922" text-anchor="middle" font-weight="700">!</text>
    <text x="786" y="324" fill="#3fb950" text-anchor="middle" font-weight="700">✓</text>
    <text x="826" y="324" font-size="13" fill="#d29922">needs {one}</text>

    <!-- row 4: fr empty -->
    <text x="70" y="360" fill="#c9d1d9">footer.copyright</text>
    <text x="566" y="360" fill="#2ea043" text-anchor="middle" font-weight="700">✓</text>
    <text x="676" y="360" fill="#6e7681" text-anchor="middle" font-weight="700">○</text>
    <text x="786" y="360" fill="#3fb950" text-anchor="middle" font-weight="700">✓</text>
    <text x="826" y="360" font-size="13" fill="#8b949e">empty</text>
  </g>

  <!-- verdict chips -->
  <g>
    <rect x="636" y="372" width="80" height="26" rx="6" fill="#3d1418" stroke="#f85149" stroke-width="1.1"/>
    <text x="676" y="390" font-size="13" fill="#f85149" text-anchor="middle" font-weight="700">✗ DRIFT</text>
    <rect x="744" y="372" width="84" height="26" rx="6" fill="#102a17" stroke="#3fb950" stroke-width="1.1"/>
    <text x="786" y="390" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="700">✓ IN SYNC</text>
  </g>

  <!-- CLDR punchline -->
  <text x="60" y="392" font-size="14" fill="#6e7681">zh only needs <tspan fill="#3fb950">other</tspan> — localediff knows, so it flags fr, not zh</text>

  <!-- install hint -->
  <text x="60" y="180" font-size="17" fill="#58a6ff">$ npx localediff ./locales <tspan fill="#6e7681">·</tspan> pip install localediff</text>
</svg>
